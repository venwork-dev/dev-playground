name: BundleCheck PR Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  bundlecheck:
    name: bundlecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Run BundleCheck
        id: audit
        uses: venwork-dev/bundlecheck-audit-action@v0.5.0
        with:
          api_key: ${{ secrets.BUNDLECHECK_API_KEY }}
          lockfile_path: yarn.lock
          per_package_gzip: 20000
          total_gzip: 120000
          fail_on_violation: true
          fail_on_partial: true
          warn_only: false

      - name: Assert outputs exist
        run: |
          test -n "${{ steps.audit.outputs.pass }}"
          test "${{ steps.audit.outputs.total_gzip }}" -ge 0
